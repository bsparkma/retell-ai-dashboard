name: staging-cd

# Phase 3 Step 3 — develop -> Azure STAGING (staging.carein.ai).
# Secretless (OIDC federated credentials). Staging only — never touches main / the
# LAN prod box. Order: build-test gate -> publish images -> run migrate Job -> deploy.

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # required for azure/login OIDC

env:
  AZ_RG: rg-carein-staging
  ACR_NAME: acrcareincore
  ACR_LOGIN: acrcareincore.azurecr.io
  BACKEND_APP: ca-carein-backend
  CADDY_APP: ca-carein-caddy
  MIGRATE_JOB: caj-carein-migrate

jobs:
  # 1) GATE — exact checks validated in Step 2/3. Red here stops everything.
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carein_owner
          POSTGRES_PASSWORD: carein_owner_devpw
          POSTGRES_DB: carein_control
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U carein_owner -d carein_control"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable

      # --- new-dashboard: tsc + vitest ---
      - name: new-dashboard install
        working-directory: new-dashboard
        run: pnpm install --frozen-lockfile
      - name: new-dashboard typecheck (tsc)
        working-directory: new-dashboard
        run: pnpm run check
      - name: new-dashboard tests (vitest)
        working-directory: new-dashboard
        run: pnpm run test

      # --- backend: install + syntax + unit tests ---
      - name: backend install
        working-directory: backend
        run: npm ci
      - name: backend syntax check
        working-directory: backend
        run: node --check server.js
      - name: backend unit tests
        working-directory: backend
        run: node --test

      # --- spine smoke test (12/12) against an ephemeral Postgres ---
      - name: prepare ephemeral DB (carein_app role + tenant DB)
        env: { PGPASSWORD: carein_owner_devpw }
        run: |
          psql -h localhost -U carein_owner -d carein_control -v ON_ERROR_STOP=1 \
            -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='carein_app') THEN CREATE ROLE carein_app LOGIN PASSWORD 'carein_app_devpw'; END IF; END \$\$;"
          psql -h localhost -U carein_owner -d carein_control -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE carein_t_carein OWNER carein_owner;"
          psql -h localhost -U carein_owner -d carein_t_carein -v ON_ERROR_STOP=1 \
            -c "GRANT USAGE ON SCHEMA public TO carein_app;"
      - name: migrate control + tenant (ephemeral, as owner)
        working-directory: backend
        env:
          CONTROL_DB_URL: postgres://carein_owner:carein_owner_devpw@localhost:5432/carein_control
          MIGRATE_TENANT_DB_URL: postgres://carein_owner:carein_owner_devpw@localhost:5432/carein_t_carein
          CAREIN_SEED_CONNECTOR_URL: https://connector-placeholder.ci.local
        run: |
          node scripts/migrate.js up
          node scripts/migrate-tenant.js up --tenant carein
      - name: spine smoke test (registry / tenantDb / append-only audit / entitlement)
        working-directory: backend
        env:
          CONTROL_DB_URL: postgres://carein_owner:carein_owner_devpw@localhost:5432/carein_control
          TENANT_CAREIN_DB_URL: postgres://carein_app:carein_app_devpw@localhost:5432/carein_t_carein
        run: node scripts/smoke-spine.js

  # 2) PUBLISH — build BOTH images in ACR from their Dockerfiles (OIDC login).
  publish:
    needs: build-test
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Build backend image (ACR)
        run: az acr build -r "$ACR_NAME" -t "carein-backend:${{ steps.vars.outputs.sha }}" -t "carein-backend:staging" backend
      - name: Build caddy image (ACR, multi-stage builds the SPA)
        run: az acr build -r "$ACR_NAME" -t "carein-caddy:${{ steps.vars.outputs.sha }}" -t "carein-caddy:staging" -f deploy/container/azure/Dockerfile.caddy .

  # 3) MIGRATE — run the in-Azure Container Apps Job (owner role) and poll.
  #    A failed migration blocks deploy so a bad image never goes live unmigrated.
  migrate:
    needs: publish
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Start migrate job and wait
        run: |
          set -euo pipefail
          EXEC=$(az containerapp job start -n "$MIGRATE_JOB" -g "$AZ_RG" --query name -o tsv)
          echo "Started execution: $EXEC"
          for i in $(seq 1 60); do
            STATUS=$(az containerapp job execution show -n "$MIGRATE_JOB" -g "$AZ_RG" \
              --job-execution-name "$EXEC" --query properties.status -o tsv 2>/dev/null || echo "Unknown")
            echo "  [$i] status=$STATUS"
            case "$STATUS" in
              Succeeded) echo "migrations OK"; exit 0 ;;
              Failed|Degraded|Canceled) echo "::error::migration job $STATUS"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::migration job timed out"; exit 1

  # 4) DEPLOY — roll both apps to the new image. New revision goes live; scale-to-zero unchanged.
  deploy:
    needs: [publish, migrate]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy backend
        run: az containerapp update -n "$BACKEND_APP" -g "$AZ_RG" --image "$ACR_LOGIN/carein-backend:${{ needs.publish.outputs.sha }}"
      - name: Deploy caddy
        run: az containerapp update -n "$CADDY_APP" -g "$AZ_RG" --image "$ACR_LOGIN/carein-caddy:${{ needs.publish.outputs.sha }}"
      - name: Smoke check staging
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://staging.carein.ai/api/health || true)
            echo "  health: $code"
            [ "$code" = "200" ] && exit 0
            sleep 8
          done
          echo "::error::staging health check did not return 200"; exit 1

  # 5) PROD — DISABLED placeholder (Step 5). Wired to NOTHING. Never the LAN box.
  deploy-prod:
    if: ${{ false }}   # disabled until Azure prod exists (Step 5)
    needs: deploy
    runs-on: ubuntu-latest
    environment: production   # add a required reviewer on this environment in Step 5
    steps:
      - name: Placeholder
        run: echo "Prod deploy is a Step 5 placeholder. Do not wire to any live resource."
