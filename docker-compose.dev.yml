version: '3.8'

services:
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - RETELL_API_KEY=${RETELL_API_KEY:-key_5286e8b619b00ed6815991eba586}
      - CORS_ORIGIN=http://localhost:3002
      - OPENDENTAL_DB_URL=${OPENDENTAL_DB_URL:-}
      - OD_API_URL=${OD_API_URL:-}
      - OD_API_KEY=${OD_API_KEY:-}
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      - REACT_APP_API_URL=/api
      - WDS_SOCKET_PORT=3002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-dev
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules: 